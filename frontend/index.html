<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OtterMediator</title>
<style>
:root {
  --bg: #0d0d0d;
  --card: #1a1a1a;
  --card-idle: #141414;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --subtext: #777;
  --accent: #4f9cf9;
  --green: #4caf50;
  --red: #e05252;
  --yellow: #f0b429;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }

#header {
  background: #111;
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
#header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
#header .subtitle { font-size: 0.75rem; color: var(--subtext); }
#ws-status { margin-left: auto; font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 10px; font-weight: 600; }
#ws-status.connected { background: #1a3a1a; color: var(--green); }
#ws-status.disconnected { background: #3a1a1a; color: var(--red); }

#empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  color: var(--subtext);
  gap: 0.5rem;
  text-align: center;
}
#empty-state .icon { font-size: 3rem; opacity: 0.3; }

#grid {
  position: relative;
  width: 100%;
  min-height: calc(100vh - 52px);
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: opacity 0.4s, border-color 0.3s, box-shadow 0.2s;
  position: absolute;
  width: 340px;
  user-select: none;
}
.card.idle, .card.disconnected { opacity: 0.5; }
.card.playing { border-color: #2a3a2a; }

/* Card overlay for blocking interaction during cast */
.card-overlay {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  z-index: 10;
  backdrop-filter: blur(2px);
  background: rgba(0,0,0,0.6);
  pointer-events: all;
}
.card-overlay .overlay-spinner {
  width: 28px; height: 28px;
  border: 3px solid #333;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.card-overlay .overlay-msg {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
}
.card-overlay.success { background: rgba(0,40,0,0.75); }
.card-overlay.success .overlay-msg { color: var(--green); }
.card-overlay.failure { background: rgba(40,0,0,0.75); }
.card-overlay.failure .overlay-msg { color: var(--red); }
.card-overlay .overlay-icon { font-size: 2rem; line-height: 1; }
@keyframes spin { to { transform: rotate(360deg); } }

.card-inner { padding: 1rem; }

/* Device header */
.device-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
}
.state-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--subtext);
  flex-shrink: 0;
}
.state-dot.playing { background: var(--green); animation: pulse 1.5s infinite; }
.state-dot.buffering { background: var(--yellow); animation: pulse 0.8s infinite; }
.state-dot.paused { background: var(--yellow); }
.state-dot.disconnected { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

.app-icon { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
.device-name { font-weight: 700; font-size: 0.95rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.app-name { font-size: 0.75rem; color: var(--subtext); white-space: nowrap; }

/* Artwork */
.artwork-wrap {
  width: 100%;
  aspect-ratio: 16/9;
  background: #0a0a0a;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.artwork-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.artwork-placeholder {
  color: var(--subtext);
  font-size: 2.5rem;
  opacity: 0.2;
}
.artwork-site {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  gap: 0.5rem;
  background: radial-gradient(ellipse at center, #1a2a1a 0%, #0a0a0a 100%);
  animation: site-glow 3s ease-in-out infinite;
}
.artwork-site .site-globe { font-size: 2rem; opacity: 0.7; }
.artwork-site .site-name {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--accent);
  text-align: center;
  padding: 0 1rem;
  opacity: 0.9;
  letter-spacing: 0.03em;
}
.artwork-site .site-live {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--green);
  opacity: 0.8;
}
@keyframes site-glow {
  0%, 100% { background: radial-gradient(ellipse at center, #1a2a1a 0%, #0a0a0a 100%); }
  50% { background: radial-gradient(ellipse at center, #1e2e1e 0%, #0d0d0d 100%); }
}

/* Media info */
.media-title {
  font-size: 0.95rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.media-subtitle {
  font-size: 0.8rem;
  color: var(--subtext);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 0.5rem;
}

/* Progress */
.progress-bar {
  width: 100%;
  height: 4px;
  background: #2a2a2a;
  border-radius: 2px;
  cursor: pointer;
  margin-bottom: 4px;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s linear;
  pointer-events: none;
}
.time-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  color: var(--subtext);
  margin-bottom: 0.6rem;
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 0.6rem;
}
.btn {
  background: #252525;
  border: none;
  color: var(--text);
  padding: 0.4rem 0.65rem;
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.95rem;
  transition: background 0.15s;
  line-height: 1;
}
.btn:hover { background: #333; }
.btn.primary { background: var(--accent); color: #fff; }
.btn.primary:hover { background: #3a85e0; }
.btn.danger { background: #3a1a1a; color: var(--red); }
.btn.danger:hover { background: #4a2a2a; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Volume */
.volume-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.65rem;
  font-size: 0.85rem;
}
.volume-icon { cursor: pointer; user-select: none; font-size: 1rem; }
input[type=range] {
  flex: 1;
  accent-color: var(--accent);
  height: 4px;
  cursor: pointer;
}
.volume-pct { font-size: 0.72rem; color: var(--subtext); min-width: 28px; text-align: right; }

/* Cast row */
.cast-row {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 0.5rem;
}
.cast-input {
  flex: 1;
  background: #222;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.35rem 0.5rem;
  border-radius: 7px;
  font-size: 0.78rem;
  outline: none;
}
.cast-input:focus { border-color: var(--accent); }
.btn-sm {
  background: #252525;
  border: none;
  color: var(--text);
  padding: 0.3rem 0.6rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.75rem;
  white-space: nowrap;
}
.btn-sm:hover { background: #333; }
.btn-sm.accent { background: var(--accent); color: #fff; }

/* Keep-alive */
.keepalive-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.78rem;
}
.keepalive-label { color: var(--subtext); white-space: nowrap; }
.keepalive-select {
  background: #222;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.25rem 0.4rem;
  border-radius: 6px;
  font-size: 0.75rem;
  outline: none;
  cursor: pointer;
}
.keepalive-url {
  flex: 1;
  background: #222;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.25rem 0.4rem;
  border-radius: 6px;
  font-size: 0.72rem;
  outline: none;
  min-width: 0;
}
.keepalive-url:focus { border-color: var(--accent); }
.keepalive-badge {
  font-size: 0.65rem;
  padding: 1px 5px;
  border-radius: 4px;
  font-weight: 700;
  white-space: nowrap;
}
.keepalive-badge.keepalive { background: #1a2a3a; color: var(--accent); }
.keepalive-badge.force { background: #3a1a1a; color: var(--red); }

/* Drag and drop */
.card.dragging-free { box-shadow: 0 8px 32px rgba(0,0,0,0.6); opacity: 0.92; z-index: 1000; transition: none; }

/* Maximize button */
.maximize-btn {
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  background: rgba(0,0,0,0.5);
  border: none;
  color: var(--subtext);
  width: 22px; height: 22px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.7rem;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
}
.card:hover .maximize-btn { opacity: 1; }
.maximize-btn:hover { color: var(--text); background: rgba(0,0,0,0.8); }

/* Popover */
#popover-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: rgba(0,0,0,0.6);
}
#popover-backdrop.open { display: flex; }
#popover-bg {
  position: absolute;
  inset: -5%;
  background-size: cover;
  background-position: center;
  filter: blur(40px) brightness(0.3) saturate(1.4);
}
#popover {
  background: rgba(20,20,20,0.72);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  overflow: hidden;
  width: min(900px, 92vw);
  max-height: 94vh;
  overflow-y: auto;
  position: fixed;
  z-index: 2001;
  box-shadow: 0 24px 80px rgba(0,0,0,0.8);
  animation: pop-in 0.18s ease;
  backdrop-filter: blur(4px);
  cursor: default;
  user-select: none;
}
#popover .artwork-wrap {
  cursor: grab;
}
#popover .artwork-wrap:active {
  cursor: grabbing;
}
@keyframes pop-in {
  from { transform: scale(0.93); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
#popover .close-btn {
  position: absolute;
  top: 0.75rem; right: 0.75rem;
  background: rgba(0,0,0,0.5);
  border: none; color: var(--text);
  width: 28px; height: 28px;
  border-radius: 6px;
  cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  z-index: 3;
}
#popover .close-btn:hover { background: rgba(255,255,255,0.1); }
#popover .card-inner { padding: 1.25rem; }
#popover .artwork-wrap { aspect-ratio: 16/9; margin-bottom: 1rem; }
#popover .media-title { font-size: 1.2rem; margin-bottom: 4px; }
#popover .media-subtitle { font-size: 0.9rem; margin-bottom: 0.75rem; }
#popover .progress-bar { height: 6px; margin-bottom: 6px; }
#popover .controls { gap: 0.6rem; margin-bottom: 0.8rem; }
#popover .btn { font-size: 1.1rem; padding: 0.5rem 0.85rem; }
#popover .volume-row { font-size: 1rem; margin-bottom: 0.8rem; }
#popover .cast-row { margin-bottom: 0.6rem; }
#popover .cast-input { font-size: 0.85rem; }
</style>
</head>
<body>
<div id="header">
  <h1>⊙ OtterMediator</h1>
  <span class="subtitle">Media Cockpit</span>
  <span id="ws-status" class="disconnected">Connecting…</span>
</div>

<div id="popover-backdrop" onclick="closePopover(event)">
  <div id="popover-bg"></div>
  <div id="popover">
    <button class="close-btn" onclick="closePopover()">✕</button>
    <div id="popover-content"></div>
  </div>
</div>

<div id="empty-state">
  <div class="icon">📡</div>
  <div>Scanning for Chromecast devices…</div>
  <div style="font-size:0.8rem;margin-top:0.25rem;">Make sure you're on the same network</div>
</div>

<div id="grid" style="display:none;"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const devices = new Map(); // id → DeviceStatus
const positionTimers = new Map(); // id → intervalId
const volumeDebounce = new Map(); // id → timeoutId
const castInFlight = new Set(); // id → cast request in progress
const stopInFlight = new Set(); // id → stop request in progress
let ws, reconnectDelay = 1000;

// ── Card positioning ──────────────────────────────────────────────────────────
const cardPositions = JSON.parse(localStorage.getItem('cardPositions') || '{}');
const CARD_W = 340, CARD_GAP = 16, CARD_START = 16;

function savePos(id, x, y) {
  cardPositions[id] = {x, y};
  localStorage.setItem('cardPositions', JSON.stringify(cardPositions));
}

function getPos(id) {
  if (cardPositions[id]) return cardPositions[id];
  // Auto-layout: place in a row
  const ids = Object.keys(cardPositions);
  const col = document.getElementById('grid').querySelectorAll('.card').length;
  const cols = Math.max(1, Math.floor((window.innerWidth - CARD_START) / (CARD_W + CARD_GAP)));
  const x = CARD_START + (col % cols) * (CARD_W + CARD_GAP);
  const y = CARD_START + Math.floor(col / cols) * (500 + CARD_GAP);
  return {x, y};
}

function applyPos(card, id) {
  const {x, y} = getPos(id);
  card.style.left = x + 'px';
  card.style.top = y + 'px';
}

function initDrag(card) {
  // Drag by the card-inner area but not inputs/buttons/selects/ranges
  card.addEventListener('mousedown', e => {
    if (['INPUT','BUTTON','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
    if (e.target.closest('.card-overlay')) return;
    e.preventDefault();

    const id = card.id.replace('card-', '');
    const startX = e.clientX - card.offsetLeft;
    const startY = e.clientY - card.offsetTop;

    card.classList.add('dragging-free');
    card.style.zIndex = 1000;

    const onMove = e => {
      const x = Math.max(0, e.clientX - startX);
      const y = Math.max(0, e.clientY - startY);
      card.style.left = x + 'px';
      card.style.top = y + 'px';
    };
    const onUp = e => {
      card.classList.remove('dragging-free');
      card.style.zIndex = '';
      const x = Math.max(0, e.clientX - startX);
      const y = Math.max(0, e.clientY - startY);
      savePos(id, x, y);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => {
    reconnectDelay = 1000;
    setWsStatus(true);
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'devices') {
      msg.data.forEach(d => {
        devices.set(d.id, d);
        upsertCard(d);
      });
      updateEmptyState();
    }
  };
  ws.onclose = () => {
    setWsStatus(false);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    setTimeout(connect, reconnectDelay);
  };
  ws.onerror = () => ws.close();
}

function setWsStatus(ok) {
  const el = document.getElementById('ws-status');
  el.textContent = ok ? 'Connected' : 'Reconnecting…';
  el.className = ok ? 'connected' : 'disconnected';
}

function updateEmptyState() {
  const hasDevices = devices.size > 0;
  document.getElementById('empty-state').style.display = hasDevices ? 'none' : 'flex';
  document.getElementById('grid').style.display = hasDevices ? 'grid' : 'none';
}

// ── Card rendering ────────────────────────────────────────────────────────────
function upsertCard(d) {
  if (castInFlight.has(d.id)) return; // don't stomp button state mid-cast
  if (stopInFlight.has(d.id)) return; // don't stomp overlay while stopping
  let card = document.getElementById('card-' + d.id);
  const isNew = !card;
  if (!card) {
    card = document.createElement('div');
    card.id = 'card-' + d.id;
    card.className = 'card';
    document.getElementById('grid').appendChild(card);
    initDrag(card);
    applyPos(card, d.id);
  }

  card.className = 'card ' + d.state;

  const pct = d.duration > 0 ? (d.position / d.duration * 100).toFixed(2) : 0;
  const isPlaying = d.state === 'playing';
  const kaMode = d.keepalive_mode || 'off';

  // Preserve user-edited fields — single URL field serves both cast and keep-alive
  const urlVal = document.getElementById('cast-url-' + d.id)?.value ?? (kaMode !== 'off' ? d.keepalive_url : '') ?? '';

  card.innerHTML = `
    <button class="maximize-btn" onclick="openPopover('${esc(d.id)}')" title="Expand">⛶</button>
    <div class="card-inner">
      <div class="device-header">
        <div class="state-dot ${d.state}"></div>
        ${d.app_icon ? `<img class="app-icon" src="${esc(d.app_icon)}" onerror="this.style.display='none'">` : ''}
        <span class="device-name" title="${esc(d.name)}">${esc(d.name)}</span>
        ${d.app ? `<span class="app-name">${esc(d.app)}</span>` : ''}
        ${kaMode !== 'off' ? `<span class="keepalive-badge ${kaMode}">${kaMode === 'force' ? '🔒 force' : '♻ keep-alive'}</span>` : ''}
      </div>

      <div class="artwork-wrap">
        ${d.artwork
          ? `<img class="artwork-img" src="${esc(d.artwork)}" onerror="this.parentNode.innerHTML='<div class=artwork-placeholder>▶</div>'">`
          : d.active_url && d.state !== 'idle' && d.state !== 'disconnected'
            ? `<img class="artwork-img" src="/api/preview?url=${encodeURIComponent(d.active_url)}" onerror="this.parentNode.innerHTML='<div class=artwork-site><div class=site-globe>🌐</div><div class=site-name>${esc(d.app_status || d.app || '')}</div><div class=site-live>● live</div></div>'">`
            : d.app_status && d.state !== 'idle' && d.state !== 'disconnected'
              ? `<div class="artwork-site"><div class="site-globe">🌐</div><div class="site-name">${esc(d.app_status)}</div><div class="site-live">● live</div></div>`
              : '<div class="artwork-placeholder">▶</div>'}
      </div>

      <div class="media-title">${esc(d.title || d.app_status || (d.state === 'idle' ? 'Idle' : d.state === 'disconnected' ? 'Disconnected' : ''))}</div>
      <div class="media-subtitle">${esc(d.subtitle || '')}</div>

      <div class="progress-bar" data-id="${esc(d.id)}" data-duration="${d.duration}" onclick="seekClick(event)">
        <div class="progress-fill" id="prog-${esc(d.id)}" style="width:${pct}%"></div>
      </div>
      <div class="time-row">
        <span id="pos-${esc(d.id)}">${fmtTime(d.position)}</span>
        <span>${fmtTime(d.duration)}</span>
      </div>

      <div class="controls">
        <button class="btn" onclick="api('${esc(d.id)}','prev',null,this)" title="Previous">⏮</button>
        <button class="btn primary" onclick="api('${esc(d.id)}', isPlaying_${safeId(d.id)} ? 'pause' : 'play',null,this)" id="playbtn-${esc(d.id)}">${isPlaying ? '⏸' : '▶'}</button>
        <button class="btn" onclick="api('${esc(d.id)}','next',null,this)" title="Next">⏭</button>
        <button class="btn danger" onclick="stopDevice('${esc(d.id)}')" title="Stop">⏹</button>
      </div>

      <div class="volume-row">
        <span class="volume-icon" onclick="toggleMute('${esc(d.id)}',${d.muted})">${d.muted ? '🔇' : '🔊'}</span>
        <input type="range" min="0" max="1" step="0.01" value="${d.volume}"
               oninput="volumeInput('${esc(d.id)}', this.value)">
        <span class="volume-pct">${Math.round(d.volume * 100)}%</span>
      </div>

      <div class="cast-row">
        <input id="cast-url-${esc(d.id)}" class="cast-input" type="url" placeholder="URL…" value="${esc(urlVal)}"
               onchange="setKeepaliveURL('${esc(d.id)}', this.value)">
        <button class="btn-sm accent" onclick="castAuto('${esc(d.id)}', this)">Cast</button>
      </div>

      <div class="keepalive-row">
        <span class="keepalive-label">Keep-alive:</span>
        <select class="keepalive-select" onchange="setKeepaliveMode('${esc(d.id)}', this.value)">
          <option value="off"${kaMode==='off'?' selected':''}>Off</option>
          <option value="keepalive"${kaMode==='keepalive'?' selected':''}>Keep-alive</option>
          <option value="force"${kaMode==='force'?' selected':''}>Force</option>
        </select>
      </div>
    </div>
  `;

  // Expose isPlaying for the play button onclick
  window['isPlaying_' + safeId(d.id)] = isPlaying;

  // Keep popover in sync
  if (popoverDeviceId === d.id) renderPopover();

  // Start/reset position interpolation
  clearInterval(positionTimers.get(d.id));
  if (isPlaying && d.duration > 0) {
    let pos = d.position;
    const timer = setInterval(() => {
      pos += 1;
      if (pos > d.duration) { pos = d.duration; clearInterval(timer); }
      const p = document.getElementById('pos-' + d.id);
      const f = document.getElementById('prog-' + d.id);
      if (p) p.textContent = fmtTime(pos);
      if (f) f.style.width = (pos / d.duration * 100).toFixed(2) + '%';
    }, 1000);
    positionTimers.set(d.id, timer);
  }
}

// ── Controls ──────────────────────────────────────────────────────────────────
function api(id, action, body, feedbackBtn, done) {
  if (feedbackBtn) feedbackBtn.disabled = true;
  fetch(`/api/devices/${id}/${action}`, {
    method: 'POST',
    headers: body ? {'Content-Type': 'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  }).then(r => {
    if (feedbackBtn) {
      feedbackBtn.disabled = false;
      const orig = feedbackBtn.textContent;
      if (r.ok) {
        feedbackBtn.textContent = '✓';
        feedbackBtn.style.background = 'var(--green)';
      } else {
        feedbackBtn.textContent = '✗';
        feedbackBtn.style.background = 'var(--red)';
      }
      setTimeout(() => {
        feedbackBtn.textContent = orig;
        feedbackBtn.style.background = '';
        if (done) done();
      }, 2000);
    } else {
      if (done) done();
    }
  }).catch(err => {
    console.error(err);
    if (feedbackBtn) feedbackBtn.disabled = false;
    if (done) done();
  });
}

function seekClick(e) {
  const bar = e.currentTarget;
  const id = bar.dataset.id;
  const duration = parseFloat(bar.dataset.duration);
  if (!duration) return;
  const pct = e.offsetX / bar.offsetWidth;
  api(id, 'seek', {position: pct * duration});
}

function toggleMute(id, currentlyMuted) {
  const d = devices.get(id);
  if (!d) return;
  fetch(`/api/devices/${id}/volume`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({level: d.volume, muted: !currentlyMuted}),
  }).catch(console.error);
}

function volumeInput(id, value) {
  clearTimeout(volumeDebounce.get(id));
  const t = setTimeout(() => {
    const d = devices.get(id);
    if (!d) return;
    fetch(`/api/devices/${id}/volume`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({level: parseFloat(value), muted: d.muted}),
    }).catch(console.error);
  }, 200);
  volumeDebounce.set(id, t);
}

function stopDevice(id) {
  const card = document.getElementById('card-' + id);
  const overlay = document.createElement('div');
  overlay.className = 'card-overlay';
  overlay.innerHTML = `<div class="overlay-spinner"></div><div class="overlay-msg">Stopping…</div>`;
  card.appendChild(overlay);
  stopInFlight.add(id);

  const dismiss = () => {
    stopInFlight.delete(id);
    overlay.remove();
    // Re-render card now that we're no longer blocking updates.
    const d = devices.get(id);
    if (d) upsertCard(d);
  };

  fetch(`/api/devices/${id}/stop`, {method: 'POST'})
    .then(r => {
      if (r.ok) {
        overlay.className = 'card-overlay success';
        overlay.innerHTML = `<div class="overlay-icon">✓</div><div class="overlay-msg">Stopping…</div>`;
        // Wait until device reports idle/disconnected, then dismiss.
        const check = setInterval(() => {
          const d = devices.get(id);
          if (!d || d.state === 'idle' || d.state === 'disconnected') {
            clearInterval(check);
            clearTimeout(cap);
            setTimeout(dismiss, 800);
          }
        }, 300);
        // Safety cap — dismiss after 10s regardless.
        const cap = setTimeout(() => { clearInterval(check); dismiss(); }, 10000);
      } else {
        return r.text().then(msg => {
          overlay.className = 'card-overlay failure';
          overlay.innerHTML = `<div class="overlay-icon">✗</div><div class="overlay-msg">${esc(msg.trim() || 'Failed')}</div>`;
          setTimeout(dismiss, 2500);
        });
      }
    }).catch(err => {
      overlay.className = 'card-overlay failure';
      overlay.innerHTML = `<div class="overlay-icon">✗</div><div class="overlay-msg">${esc(String(err))}</div>`;
      setTimeout(dismiss, 2500);
    });
}

function castAuto(id, btn) {
  const input = document.getElementById('cast-url-' + id);
  if (!input || !input.value.trim()) return;
  const url = input.value.trim();

  const card = document.getElementById('card-' + id);
  const overlay = document.createElement('div');
  overlay.className = 'card-overlay';
  overlay.innerHTML = `<div class="overlay-spinner"></div><div class="overlay-msg">Casting to device…</div>`;
  card.appendChild(overlay);

  castInFlight.add(id);
  fetch(`/api/devices/${id}/cast-auto`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url}),
  }).then(r => {
    if (r.ok) {
      overlay.className = 'card-overlay success';
      overlay.innerHTML = `<div class="overlay-icon">✓</div><div class="overlay-msg">Casting started</div>`;
    } else {
      return r.text().then(msg => {
        overlay.className = 'card-overlay failure';
        overlay.innerHTML = `<div class="overlay-icon">✗</div><div class="overlay-msg">${esc(msg.trim() || 'Failed')}</div>`;
      });
    }
  }).catch(err => {
    overlay.className = 'card-overlay failure';
    overlay.innerHTML = `<div class="overlay-icon">✗</div><div class="overlay-msg">${esc(String(err))}</div>`;
  }).finally(() => {
    setTimeout(() => {
      overlay.remove();
      castInFlight.delete(id);
    }, 2500);
  });
}

function setKeepaliveMode(id, mode) {
  const url = document.getElementById('cast-url-' + id)?.value.trim() ?? '';
  fetch(`/api/devices/${id}/keepalive`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({mode, url}),
  }).catch(console.error);
}

function setKeepaliveURL(id, url) {
  const d = devices.get(id);
  if (!d) return;
  fetch(`/api/devices/${id}/keepalive`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({mode: d.keepalive_mode || 'off', url: url.trim()}),
  }).catch(console.error);
}

// ── Popover ───────────────────────────────────────────────────────────────────
let popoverDeviceId = null;

function openPopover(id) {
  popoverDeviceId = id;
  renderPopover();
  const pop = document.getElementById('popover');
  // Reset to center
  pop.style.left = '';
  pop.style.top = '';
  pop.style.transform = '';
  document.getElementById('popover-backdrop').classList.add('open');
  // Center via fixed positioning after layout
  requestAnimationFrame(() => {
    const r = pop.getBoundingClientRect();
    pop.style.left = (window.innerWidth / 2 - r.width / 2) + 'px';
    pop.style.top  = (window.innerHeight / 2 - r.height / 2) + 'px';
    initPopoverDrag(pop);
  });
  document.addEventListener('keydown', popoverKeydown);
}

function initPopoverDrag(pop) {
  // Drag by artwork or anywhere that's not a control
  pop.onmousedown = e => {
    if (['INPUT','BUTTON','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
    if (e.target.closest('.progress-bar') || e.target.closest('.volume-row')) return;
    e.preventDefault();
    const startX = e.clientX - pop.offsetLeft;
    const startY = e.clientY - pop.offsetTop;
    const onMove = e => {
      const x = Math.max(0, Math.min(window.innerWidth - pop.offsetWidth, e.clientX - startX));
      const y = Math.max(0, Math.min(window.innerHeight - pop.offsetHeight, e.clientY - startY));
      pop.style.left = x + 'px';
      pop.style.top  = y + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };
}

function renderPopover() {
  if (!popoverDeviceId) return;
  const card = document.getElementById('card-' + popoverDeviceId);
  if (!card) return;
  const inner = card.querySelector('.card-inner');
  if (!inner) return;
  document.getElementById('popover-content').innerHTML = inner.outerHTML;

  // Extract image for blurred background
  const img = card.querySelector('.artwork-img');
  const bg = document.getElementById('popover-bg');
  if (img && img.src && !img.src.endsWith('#')) {
    bg.style.backgroundImage = `url('${img.src}')`;
    bg.style.display = '';
  } else {
    bg.style.backgroundImage = '';
    bg.style.display = 'none';
  }
}

function closePopover(e) {
  if (e && e.target !== document.getElementById('popover-backdrop')) return;
  const pop = document.getElementById('popover');
  pop.onmousedown = null;
  document.getElementById('popover-backdrop').classList.remove('open');
  document.removeEventListener('keydown', popoverKeydown);
  popoverDeviceId = null;
}

function popoverKeydown(e) {
  if (e.key === 'Escape') closePopover();
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function fmtTime(s) {
  if (!s || s <= 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function safeId(s) {
  return String(s).replace(/[^a-zA-Z0-9]/g, '_');
}

connect();
